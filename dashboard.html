<div class="item" style="margin-top:12px;">
  <b>The peakX Feed</b>
  <div class="muted" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
    <span>peakx.social</span>
    <span>·</span>
    <span class="status running">Running</span>

    <!-- Only show this row for external/custom domains that are not verified -->
    <span id="dnsPendingWrap" style="display:none; align-items:center; gap:8px;">
      <span>·</span>
      <span class="status pending">DNS pending</span>
      <button
        class="secondary dnsCheckBtn"
        id="checkDnsBtn"
        type="button"
        style="width:auto; padding:6px 10px; min-width:0;"
      >
        Check DNS
      </button>
    </span>

    <!-- Quiet success state -->
    <span id="dnsVerifiedWrap" style="display:none; align-items:center; gap:8px;">
      <span>·</span>
      <span class="status verified">DNS verified</span>
    </span>
  </div>
</div>
